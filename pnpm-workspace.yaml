# https://pnpm.io/settings

# pnpm add @pnpm/pacquet --config
# configDependencies:
#   "@pnpm/pacquet": 0.2.12

# Keine Dependencies von Git-Repositories git+ssh://... und von direkten URLs zu TARs https://.../package.tgz
# https://pnpm.io/settings#blockexoticsubdeps
# Problem: body-parser
#blockExoticSubdeps : true

# https://pnpm.io/settings#minimumreleaseage
# default: 1 Tag = 24 * 60 Minuten
#minimumReleaseAge: 1440
# 1 Woche
#minimumReleaseAge: 10080

# https://pnpm.io/settings#packagemanagerstrictversion
packageManagerStrictVersion: true

# https://pnpm.io/cli/add#--save-exact--e
saveExact: true

# https://pnpm.io/settings#saveprefix
savePrefix: ""

allowBuilds:
  '@prisma/engines': true
  prisma: true
