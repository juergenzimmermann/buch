info:
  name: Buch 30 ohne Versionsnummer ändern
  type: http
  seq: 3

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: ""
      value: ""
      disabled: true
  params:
    - name: id
      value: "30"
      type: path
  body:
    type: json
    data: |-
      {
        "isbn": "978-0-201-63361-0",
        "rating": 5,
        "art": "HARDCOVER",
        "preis": 3333,
        "rabatt": 0.33,
        "lieferbar": true,
        "datum": "2025-03-03T00:00:00Z",
        "homepage": "https://put.rest",
        "schlagwoerter": ["JAVASCRIPT"]
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "428"
    - expression: res.headers['content-type']
      operator: eq
      value: application/problem+json
    - expression: res.body.statusCode
      operator: eq
      value: "428"
    - expression: res.body.detail
      operator: contains
      value: If-Match

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
