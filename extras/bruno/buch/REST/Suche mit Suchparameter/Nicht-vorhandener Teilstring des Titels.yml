info:
  name: Nicht-vorhandener Teilstring des Titels
  type: http
  seq: 6

http:
  method: GET
  url: "{{restUrl}}?titel=xxx"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: titel
      value: xxx
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
