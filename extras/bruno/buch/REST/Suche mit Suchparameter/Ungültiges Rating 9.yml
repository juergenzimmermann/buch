info:
  name: Ungültiges Rating 9
  type: http
  seq: 18

http:
  method: GET
  url: "{{restUrl}}?rating=9"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: rating
      value: "9"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
