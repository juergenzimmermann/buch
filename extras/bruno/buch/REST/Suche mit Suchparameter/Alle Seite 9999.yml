info:
  name: Alle Seite 9999
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}?page=9999"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: page
      value: "9999"
      type: query
  auth: inherit

runtime:
