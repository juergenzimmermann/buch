info:
  name: ISBN falsch
  type: http
  seq: 8

http:
  method: GET
  url: "{{restUrl}}?isbn=x"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: isbn
      value: x
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
